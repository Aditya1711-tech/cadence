spring:
  application:
    name: cadence-backend
  threads:
    virtual:
      enabled: true            # §3 — virtual threads ON (not WebFlux)
  jackson:
    property-naming-strategy: SNAKE_CASE   # wire shape = Event Contract (§5)
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false     # RFC3339 strings (§5)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cadence}
    username: ${DATABASE_USER:cadence}
    password: ${DATABASE_PASSWORD:}
    hikari:
      pool-name: cadence-app
      maximum-pool-size: 20
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}   # P2-F pattern cache + token cap
  flyway:
    enabled: true
    locations: classpath:db/migration
    # V1 runs non-transactionally (TimescaleDB continuous aggregates); per-script
    # control comes from V1__init.sql.conf.
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}

server:
  port: ${SERVER_PORT:8080}

cadence:
  jwt:
    signing-secret: ${JWT_SIGNING_SECRET:}
    ttl-minutes: ${JWT_TTL_MINUTES:60}
  org:
    default-privacy: ${DEFAULT_ORG_PRIVACY:categories_only}
  mail:
    from: ${SMTP_FROM:no-reply@cadence.local}
  app:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}
  insights:                            # P3-A digest / aggregated facts
    fragmentation-saturation: ${CADENCE_FRAGMENTATION_SATURATION:4.0}  # switches/focus-h ⇒ index 100
  digest:                              # P3-A.5 weekly digest job
    enabled: ${CADENCE_DIGEST_ENABLED:false}     # off unless ANTHROPIC_API_KEY present (template fallback otherwise)
    model: ${CADENCE_DIGEST_MODEL:claude-sonnet-4-6}
    cron: ${CADENCE_DIGEST_CRON:0 0 23 * * SUN}  # Sunday 23:00
    min-days: ${CADENCE_DIGEST_MIN_DAYS:14}      # min history before a member gets a digest
    max-output-tokens: ${CADENCE_DIGEST_MAX_OUTPUT_TOKENS:1024}
  github:                                    # P2-D — GitHub integration
    app-id: ${GITHUB_APP_ID:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}  # PEM, base64; full_diff only
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    default-mode: ${GITHUB_DEFAULT_MODE:commit_messages_only}
  categorize:                          # P2-F categorisation worker
    enabled: ${CADENCE_CATEGORIZE_ENABLED:false}   # off unless ANTHROPIC_API_KEY+Redis present
    model: ${CADENCE_CATEGORIZE_MODEL:claude-haiku-4-5}
    daily-token-cap: ${CADENCE_CATEGORIZE_DAILY_TOKEN_CAP:0}   # per-org/day; 0 = unlimited
    poll-interval-ms: ${CADENCE_CATEGORIZE_POLL_MS:2000}
    batch-size: ${CADENCE_CATEGORIZE_BATCH:20}     # keep <= datasource pool size
    max-attempts: ${CADENCE_CATEGORIZE_MAX_ATTEMPTS:5}
    max-output-tokens: ${CADENCE_CATEGORIZE_MAX_OUTPUT_TOKENS:256}
    cache-ttl-days: ${CADENCE_CATEGORIZE_CACHE_TTL_DAYS:30}
  nlquery:                             # P3-C natural-language query (text-to-SQL)
    enabled: ${CADENCE_NLQUERY_ENABLED:false}   # off unless ANTHROPIC_API_KEY + readonly DS present
    model: ${CADENCE_NLQUERY_MODEL:claude-sonnet-4-6}
    max-rows: ${CADENCE_NLQUERY_MAX_ROWS:5000}          # result-row cap (LIMIT max+1)
    statement-timeout-ms: ${CADENCE_NLQUERY_TIMEOUT_MS:5000}   # per-query runaway guard
    max-output-tokens: ${CADENCE_NLQUERY_MAX_OUTPUT_TOKENS:1024}
    # The SELECT-only, non-owner, RLS-enforced datasource (CADENCE_NLQUERY_DB_ROLE
    # = cadence_readonly). A SEPARATE datasource from the owner connection — the
    # text-to-SQL path NEVER rides the owner/app datasource (kickoff hard rule).
    db-url: ${CADENCE_NLQUERY_DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/cadence}}
    db-role: ${CADENCE_NLQUERY_DB_ROLE:cadence_readonly}
    db-password: ${CADENCE_NLQUERY_DB_PASSWORD:cadence_readonly}
  pattern:                             # P3-B pattern engine (confidence-gated findings)
    min-days: ${CADENCE_PATTERN_MIN_DAYS:14}       # history floor; < this ⇒ no findings
    peak-concentration: ${CADENCE_PATTERN_PEAK_CONCENTRATION:1.5}  # peak hour ≥ N× avg active hour
    min-correlation: ${CADENCE_PATTERN_MIN_CORRELATION:0.4}        # |r| floor for findings 2 & 3
    min-effect: ${CADENCE_PATTERN_MIN_EFFECT:0.15}                 # min output delta on high/low split
  budget:                              # P3-E agentic token-budget monitor
    enabled: ${CADENCE_BUDGET_ENABLED:false}       # off unless ANTHROPIC_API_KEY present
    model: ${CADENCE_BUDGET_MODEL:claude-haiku-4-5}
    check-cron: ${CADENCE_BUDGET_CHECK_CRON:0 0 * * * *}   # hourly
    spike-multiplier: ${CADENCE_BUDGET_SPIKE_MULTIPLIER:3.0}    # global default; per-org overrides in DB
    min-absolute-usd: ${CADENCE_BUDGET_MIN_ABSOLUTE_USD:10.00}  # PROVISIONAL — retune post-deploy (>=2wk data)
    baseline-days: ${CADENCE_BUDGET_BASELINE_DAYS:14}
    min-history-days: ${CADENCE_BUDGET_MIN_HISTORY_DAYS:7}
    tiers: ${CADENCE_BUDGET_TIERS:3,5,10}          # severity tiers (escalation/dedupe)
    max-output-tokens: ${CADENCE_BUDGET_MAX_OUTPUT_TOKENS:200}
    slack-webhook-url: ${SLACK_WEBHOOK_URL:}       # LOCAL-TEST default only; real = per-org DB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
