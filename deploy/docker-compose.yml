# P2-A.9 — local "cloud" for development (LOCAL-SETUP.md).
# Postgres+TimescaleDB, Redis, and the Spring backend. Minimal services (§4).
#
# Usage:
#   cp deploy/.env.example deploy/.env   # fill secrets
#   docker compose -f deploy/docker-compose.yml up --build
services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-cadence}
      POSTGRES_USER: ${DATABASE_USER:-cadence}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-cadence}
    ports:
      - "5432:5432"
    volumes:
      - cadence_pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-cadence} -d ${DATABASE_NAME:-cadence}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${DATABASE_NAME:-cadence}
      DATABASE_USER: ${DATABASE_USER:-cadence}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-cadence}
      REDIS_URL: redis://redis:6379
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
      DEFAULT_ORG_PRIVACY: ${DEFAULT_ORG_PRIVACY:-categories_only}
      SERVER_PORT: 8080
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@cadence.local}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  cadence_pgdata:
